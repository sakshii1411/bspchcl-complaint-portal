{% extends "base.html" %}
{% block title %}Edit User – BSPHCL Admin{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-3 mb-4">
  <a href="{{ url_for('admin.user_details', user_id=user.id) }}" class="btn-ghost" style="padding:7px 14px;">← Back</a>
  <h4 class="fw-800 mb-0">Edit User</h4>
</div>

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card p-4 fade-in-up">
      <!-- User header -->
      <div class="d-flex align-items-center gap-3 mb-4 pb-3" style="border-bottom:1px solid var(--border);">
        <div class="profile-avatar-placeholder" style="width:52px;height:52px;font-size:20px;">{{ user.name[0].upper() }}</div>
        <div>
          <div class="fw-700">{{ user.name }}</div>
          <div style="font-size:12px;color:var(--text-muted);">{{ user.email }} · Consumer ID {{ user.id }}</div>
        </div>
      </div>

      <form method="POST" action="{{ url_for('admin.edit_user', user_id=user.id) }}" class="show-loading">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label">Full Name *</label>
              <div class="input-icon-wrap">
                <span class="input-icon"><i class="bi bi-person"></i></span>
                <input type="text" name="name" class="form-control-custom"
                       value="{{ user.name }}" required/>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label">Email (Read-only)</label>
              <input type="email" class="form-control-custom" value="{{ user.email }}" disabled
                     style="opacity:0.6;cursor:not-allowed;"/>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label">Mobile Number *</label>
              <div class="input-icon-wrap">
                <span class="input-icon"><i class="bi bi-phone"></i></span>
                <input type="tel" name="mobile" class="form-control-custom"
                       value="{{ user.mobile }}" required pattern="[6-9][0-9]{9}"/>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label">District</label>
              <input type="text" name="district" class="form-control-custom"
                     value="{{ user.district or '' }}" placeholder="e.g. Patna"/>
            </div>
          </div>
          <div class="col-12">
            <div class="form-group">
              <label class="form-label">Address</label>
              <textarea name="address" class="form-control-custom" rows="2">{{ user.address or '' }}</textarea>
            </div>
          </div>
        </div>

        <div class="d-flex gap-3 mt-3">
          <button type="submit" class="btn-primary-custom" style="padding:11px 28px;">💾 Save Changes</button>
          <a href="{{ url_for('admin.user_details', user_id=user.id) }}" class="btn-ghost" style="padding:11px 20px;">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ error_code or 500 }} – Server Error | BSPHCL Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #F8F9FC 0%, #FEE2E2 100%);
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }
    .error-card {
      background: #fff;
      border-radius: 24px;
      padding: 56px 48px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(239,68,68,.1);
    }
    .error-icon { font-size: 72px; margin-bottom: 8px; }
    .error-code {
      font-size: 96px;
      font-weight: 800;
      color: #EF4444;
      line-height: 1;
      opacity: .12;
      margin-bottom: -24px;
    }
    .error-title { font-size: 26px; font-weight: 700; color: #1E1B4B; margin-bottom: 12px; }
    .error-desc { color: #6B7280; font-size: 15px; margin-bottom: 32px; line-height: 1.6; }
    .btn-home {
      background: #6C4CF1; color: #fff; border: none;
      border-radius: 12px; padding: 12px 32px;
      font-size: 15px; font-weight: 600; text-decoration: none;
      display: inline-block; transition: .2s;
    }
    .btn-home:hover { background: #5438D0; color: #fff; transform: translateY(-1px); }
    .btn-back {
      background: #FEE2E2; color: #EF4444; border: none;
      border-radius: 12px; padding: 12px 28px;
      font-size: 15px; font-weight: 600; text-decoration: none;
      display: inline-block; margin-left: 10px; transition: .2s;
    }
    .btn-back:hover { background: #FECACA; color: #DC2626; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-icon">⚠️</div>
    <div class="error-code">500</div>
    <div class="error-title">{{ error_title or "Something Went Wrong" }}</div>
    <p class="error-desc">
      {{ custom_message or 'An unexpected server error occurred.' }}<br>
      Our team has been notified. Please try again in a few moments.
    </p>
    <a href="/" class="btn-home">Go to Home</a>
    <a href="javascript:history.back()" class="btn-back">Try Again</a>
  </div>
</body>
</html>

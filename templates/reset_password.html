<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – BSPHCL Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card fade-in" style="max-width:480px;">
    <div class="auth-right" style="padding:44px 40px;">
      <div style="width:56px;height:56px;background:var(--primary-soft);border-radius:var(--radius);
                  display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:20px;">
        🔒
      </div>
      <h2>Reset Password</h2>
      <p class="auth-subtitle">Enter the OTP sent to your email and choose a new password.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash-alert flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <!-- OTP boxes -->
      <div class="form-group">
        <label class="form-label">Enter OTP</label>
        <div id="otp-display" style="display:flex;gap:8px;margin-bottom:4px;">
          {% for i in range(6) %}
          <input type="text" class="otp-box form-control-custom" maxlength="1"
                 style="width:44px;height:48px;text-align:center;font-size:20px;font-weight:700;padding:0;"
                 oninput="otpMove(this,{{ i }})" onkeydown="otpBack(event,this,{{ i }})"/>
          {% endfor %}
        </div>
        <input type="hidden" name="otp" id="otp-hidden"/>
      </div>

      <form method="POST" action="{{ url_for('main.reset_password') }}" id="reset-form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="otp" id="otp-combined"/>

        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon"><i class="bi bi-lock"></i></span>
            <input type="password" name="new_password" id="new-pw" class="form-control-custom"
                   placeholder="Min. 8 characters" required minlength="8"/>
            <span class="input-icon-right toggle-password" data-target="new-pw" style="cursor:pointer;"><<i class="bi bi-eye"></i></span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="confirm_password" id="conf-pw" class="form-control-custom"
                   placeholder="Repeat new password" required minlength="8"/>
            <span class="input-icon-right toggle-password" data-target="conf-pw" style="cursor:pointer;"><<i class="bi bi-eye"></i></span>
          </div>
        </div>

        <button type="submit" class="btn-primary-custom w-100 justify-content-center" style="padding:12px;"
                onclick="combineOTP()">
          Reset Password &nbsp;<i class="bi bi-check-lg"></i>
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="{{ url_for('main.forgot_password') }}" class="text-primary" style="font-size:13px;">
          Resend OTP
        </a>
        &nbsp;·&nbsp;
        <a href="{{ url_for('main.login') }}" class="text-primary" style="font-size:13px;">
          Back to Login
        </a>
      </div>
    </div>
  </div>
</div>

<script>
function otpMove(el, idx) {
  el.value = el.value.replace(/[^0-9]/g, '');
  if (el.value.length === 1 && idx < 5) {
    document.querySelectorAll('.otp-box')[idx+1].focus();
  }
}
function otpBack(e, el, idx) {
  if (e.key === 'Backspace' && !el.value && idx > 0) {
    document.querySelectorAll('.otp-box')[idx-1].focus();
  }
}
function combineOTP() {
  const boxes = document.querySelectorAll('.otp-box');
  document.getElementById('otp-combined').value = Array.from(boxes).map(b => b.value).join('');
}
</script>
<script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
